# set branch name you want to push:
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push to remote repo
        uses: michaelliao/git-push-action@v3
        env:
          PUSH_SSH_KEY: ${{ ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIYfe4BIiJr7IAra4gV1z3Vulg47DWAGyNyGzwq5p6Ww 93314838+Andrew-tsx@users.noreply.github.com }}
        with:
          remote_repository: "git@gitee.com:uncletsx/1-java-learn.git"
          # optinal: set push options, default to "":
          push_options: "--force"
